services:
  - type: web
    name: trans-vividcycle-backend
    env: docker
    dockerfilePath: ./backend/Dockerfile
    envVars:
      - key: NEO4J_URI
        value: bolt://neo4j:7687
      - key: NEO4J_USER
        value: neo4j
      - key: NEO4J_PASSWORD
        value: password
      - key: JWT_SECRET
        generateValue: true
    plan: free

  - type: web
    name: trans-vividcycle-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    plan: free
